<!doctype html>
<html lang="en" class="theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->

    <link rel="canonical" href="https://tyj.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="TYJ — Track Your Journey" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TYJ — Track Your Journey" />

    <meta name="twitter:image" content="https://tyj.app/og-image.png" />

    <meta name="theme-color" content="#0b0c10" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
